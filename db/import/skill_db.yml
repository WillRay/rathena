  # Charge Arrow: reworked from a 1-level quest skill into a 5-level skill-point
  # skill (see db/import/skill_tree.yml for the Arrow Shower 5 prerequisite and
  # the raised tree MaxLevel). IsQuest is cleared so it can be learned with skill
  # points, MaxLevel is raised to 5, knockback is cut from 6 to 3 cells, and SP
