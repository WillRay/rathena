        Time: 750
      - Level: 3
        Time: 1000
      - Level: 4
        Time: 1250
      - Level: 5
        Time: 1500
    Cooldown:
      - Level: 1
        Time: 30000
      - Level: 2
        Time: 27500
      - Level: 3
        Time: 25000
      - Level: 4
        Time: 22500
      - Level: 5
        Time: 20000
    Requires:
      SpCost:
        - Level: 1
          Amount: 5
        - Level: 2
          Amount: 6
        - Level: 3
          Amount: 7
        - Level: 4
          Amount: 8
        - Level: 5
          Amount: 9
