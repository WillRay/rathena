  # Payon Stories rebalance: Poison React reduced to 5 levels. It no longer uses
  # its own damage formula; instead it autocasts Envenom at the player's learned
  # Envenom level when the holder is hit (see src/map/battle.cpp SC_POISONREACT).
  - Id: 139
    Name: AS_POISONREACT
    MaxLevel: 5
  # Payon Stories rebalance: Sonic Blow is now usable with Daggers as well as
  # Katars, so dual-dagger stealth Assassins get the same burst — and the same
  # Opportunist feed (see src/map/skills/thief/sonicblow.cpp) — that Katar
  # builds have. The full Requires block is restated so the weapon change cannot
  # silently drop the per-level SP cost.
  - Id: 136
    Name: AS_SONICBLOW
    TargetType: Self
    Flags:
      NoTargetSelf: true
    Requires:
      SpCost:
