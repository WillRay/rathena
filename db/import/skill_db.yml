  # Payon Stories rebalance: Venom Dust reworked into a damaging poison cloud.
  # The reagent (previously 2 Venom Canines) is dropped in favour of a cooldown,
  # and the cloud's element is switched from Poison to Weapon so its new direct
  # ticks land on poison-immune MVPs. The tick damage and the NoDamage flag
  # removal live in the .cpp / base file respectively.
  - Id: 140
    Name: AS_VENOMDUST
    Element: Weapon
    Duration1: 10000
    Cooldown: 20000
    Requires:
      SpCost: 20
  # Payon Stories rebalance: Venom Splasher detonation re-tuned to a linear
  # 8s -> 2s curve so the bomb procs sooner (was 15s -> 6s).
