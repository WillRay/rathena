  # Snaring Arrow (formerly Ankle Snare): converted from a ground trap into a
  # single-target bow attack. TargetType Attack makes it a normal targeted skill -
  # the player picks an enemy and it routes to castendDamageId. It deals a light
  # hit (140% + 20% per level, formula in src/map/skills/archer/anklesnare.cpp)
  # and briefly roots the target with SC_ANKLE for Duration2 (0.5s at Lv1 -> 1.5s at
  # Lv5). Range -9 + AlterRangeVulture uses the caster's bow sight range. Cooldown
  # scales 30s at Lv1 -> 20s at Lv5 to keep the root from being chained. The
  # NoDamage/IsTrap flags are cleared here; the Booby_Trap reagent was removed in
  # db/pre-re/skill_db.yml (import cannot unset an ItemCost). The dormant trap
  # Unit block is harmless - skill_unitsetting is never reached anymore.
  - Id: 117
    Name: HT_ANKLESNARE
    Description: Snaring Arrow
    Type: Weapon
    TargetType: Attack
    DamageFlags:
      NoDamage: false
    Flags:
      IsTrap: false
      AlterRangeVulture: true
    Range: -9
    Element: Weapon
    Duration2:
