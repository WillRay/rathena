        - Level: 9
          Amount: 32
        - Level: 10
          Amount: 34
      Weapon:
        Katar: true
        Dagger: true
  # Payon Stories rebalance: Grimtooth becomes the cloak-gated stealth burst.
  # Guaranteed hit (IgnoreFlee), a short 2s cooldown so it is a window and not a
  # spam, splash that grows with level, and now usable with daggers as well as
  # katars so double-dagger stealth builds have a real burst. Damage floor lives
  # in src/map/skills/thief/grimtooth.cpp. Hiding remains the primary gate, but
  # a banked Opportunist charge can substitute for it (see the AS_GRIMTOOTH
  # special case in skill_check_condition_sc_required, and the single-target
  # Opportunist branch in grimtooth.cpp). The full Requires block is restated so
  # the weapon change cannot drop the SP cost or the Hiding gate.
  - Id: 137
    Name: AS_GRIMTOOTH
    DamageFlags:
      Splash: true
      IgnoreFlee: true
    SplashArea:
      - Level: 1
        Area: 1
      - Level: 2
        Area: 1
      - Level: 3
        Area: 2
      - Level: 4
        Area: 2
      - Level: 5
        Area: 3
    Cooldown: 2000
    Requires:
      SpCost: 3
      Weapon:
        Katar: true
        Dagger: true
      Status:
        Hiding: true
