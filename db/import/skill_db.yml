        Bow: true
      Ammo:
        Arrow: true
      AmmoAmount: 1
  # Blitz Beat is a single-target strike by default. Splash is disabled
  # (Splash: false) and SplashArea zeroed here so the base cell-only behaviour is
  # what the client and DB report; the strike only widens into a 5x5 area when it
  # lands on a target carrying the "Hunted" mark, and that conditional AoE (plus
  # the matching +40% damage) is wired in C++ (src/map/skills/archer/blitzbeat.cpp
  # and src/map/battle.cpp) rather than in the DB. IgnoreFlee is preserved
  # (DamageFlags merge field-by-field). Hit count per level is unchanged.
  # A 5-second cooldown is also added so the reworked strike can't be spammed
  # back to back.
  # Now a non-targeted, instant-cast skill: TargetType Self + NoTargetSelf turns
  # it into a combo-style cast (skill_get_casttype -> CAST_DAMAGE) that
  # auto-fires on the player's current target (unit.cpp: target_id = ud->target)
  # instead of requiring a fresh target click. CastTime is zeroed so it fires
  # instantly. AlterRangeVulture / TargetTrap from the base entry are preserved
  # (Flags merge field-by-field).
  # SP cost is also flattened to a fixed 15 SP at every level (was 10/13/16/19/22)
  # so the falcon strike costs the same no matter how far it has been leveled.
  - Id: 129
    Name: HT_BLITZBEAT
    TargetType: Self
    Flags:
      NoTargetSelf: true
    DamageFlags:
      Splash: false
    SplashArea: 0
    CastTime: 0
    Cooldown: 5000
    Requires:
      SpCost:
        - Level: 1
          Amount: 15
        - Level: 2
          Amount: 15
        - Level: 3
          Amount: 15
        - Level: 4
          Amount: 15
        - Level: 5
          Amount: 15
  # Hunter rebalance: Detecting is repurposed from a utility reveal into an
