###########################################################################
# Skill Tree Database
###########################################################################
#
# Skill Tree Settings
#
###########################################################################
# - Job                   Job name.
#   Inherit               Map of job name from which Job will inherit the skill tree. (Default: null)
#                         Note that Job doesn't inherit the child skills, it only inherits the skills defined in Tree of the given job name.
#   Tree:                 List of skills available for the job. (Default: null)
#     - Name              Skill name.
#       MaxLevel          Max level of the skill. Set to 0 to remove the skill.
#       Exclude           Whether the skill is excluded from being inherited. (Default: false)
#       BaseLevel         Minimum base level required to unlock the skill. (Default: 0)
#       JobLevel          Minimum job level required to unlock the skill. (Default: 0)
#       Requires:         List of skills required to unlock the skill. (Default: null)
#         - Name          Skill name.
#           Level         Skill level required. Set to 0 to remove the skill.
###########################################################################

Header:
  Type: SKILL_TREE_DB
  Version: 1

Body:
  # Blade Mastery rebalance: SM_SWORD (renamed client-side "Sword Mastery" ->
  # "Blade Mastery") is now a 5-level skill (was 10) that grants +4 ATK per
  # level and +4 HIT per level for 1H Swords, 2H Swords, and Daggers, both
  # applied as visible status additions (see src/map/status.cpp
  # status_calc_pc_sub and db/import/skill_db.yml). Propagates to Swordman's
  # advanced/baby trees through inheritance; Rogue and Super Novice define
  # SM_SWORD natively so they are restated separately below.
  # Two-Handed Sword Mastery rebalance: SM_TWOHAND is now a 5-level skill
  # (was 10), reworked into the SC_TWOHANDBOOST spell-into-melee proc (see
  # db/import/skill_db.yml). Propagates to Swordman's advanced/baby trees
  # through inheritance; Rogue and Super Novice do not define SM_TWOHAND
  # natively so no separate restatement is needed there.
  # Increase HP Recovery and Endure rebalance: both trimmed from 10 levels to
  # 5 with doubled per-level bonuses (see db/import/skill_db.yml). Propagates
  # to Swordman's advanced/baby trees through inheritance; Super Novice and
  # Super Baby define them natively so they are restated separately below.
  # Combat Recovery rework: SM_MOVINGRECOVERY is no longer a quest-only skill (see
  # db/import/skill_db.yml Flags.IsQuest: false); it is now learned with skill
  # points, 5 levels, gated behind Increase HP Recovery (SM_RECOVERY) Rank 5.
  - Job: Swordman
    Tree:
      - Name: SM_SWORD
        MaxLevel: 5
      - Name: SM_TWOHAND
        MaxLevel: 5
      - Name: SM_RECOVERY
        MaxLevel: 5
      - Name: SM_ENDURE
        MaxLevel: 5
      - Name: SM_MOVINGRECOVERY
        MaxLevel: 5
        Requires:
          - Name: SM_RECOVERY
            Level: 5
  # Payon Stories rebalance: Preserve is available early to non-transcendent Rogues
  # so Plagiarism builds don't depend on a constant supply from other players.
  - Job: Rogue
    Tree:
      - Name: SM_SWORD
        MaxLevel: 5
      - Name: ST_PRESERVE
        MaxLevel: 1
        Requires:
          - Name: RG_PLAGIARISM
            Level: 10
  - Job: Baby_Rogue
    Tree:
      - Name: ST_PRESERVE
        MaxLevel: 1
        Requires:
          - Name: RG_PLAGIARISM
            Level: 10
  # Payon Stories rebalance: Sonic Blow no longer requires Katar Mastery 4.
  # Dagger stealth Assassins skip Katar Mastery entirely, so gating their new
  # dagger-capable Sonic Blow behind it locked them out of the skill (and of the
  # Sonic Blow -> Opportunist feed). Level 0 erases the AS_KATAR prerequisite;
  # MaxLevel 10 is restated because the parser requires it, and the removal
  # propagates to the Assassin Cross and baby trees through inheritance.
  - Job: Assassin
    Tree:
      - Name: AS_SONICBLOW
        MaxLevel: 10
        Requires:
          - Name: AS_KATAR
            Level: 0
  # Payon Stories rebalance: Charge Arrow is no longer a quest skill (the IsQuest
  # flag is cleared in db/import/skill_db.yml). It is now a 5-level skill-point
  # skill gated behind Arrow Shower 5, sitting directly under Arrow Shower in the
  # tree. The change propagates to Hunter/Sniper and the baby trees through
  # Archer inheritance.
  - Job: Archer
    Tree:
      - Name: AC_CHARGEARROW
        MaxLevel: 5
        Requires:
          - Name: AC_SHOWER
            Level: 5
  # Payon Stories rebalance: Improve Concentration no longer requires Vulture's
  # Eye 1. Level 0 erases the AC_VULTURE prerequisite; MaxLevel 10 is restated
  # because the parser requires it. The removal propagates to Hunter/Sniper,
  # Bard/Dancer and the baby/high trees through Archer inheritance. Super Novice
  # and Super Baby define the skill natively, so they are erased separately.
      - Name: AC_CONCENTRATION
        MaxLevel: 10
        Requires:
          - Name: AC_VULTURE
            Level: 0
  - Job: Supernovice
    Tree:
      - Name: SM_SWORD
        MaxLevel: 5
      - Name: SM_RECOVERY
        MaxLevel: 5
      - Name: SM_ENDURE
        MaxLevel: 5
      - Name: AC_CONCENTRATION
        MaxLevel: 10
        Requires:
          - Name: AC_VULTURE
            Level: 0
  - Job: Super_Baby
    Tree:
      - Name: SM_SWORD
        MaxLevel: 5
      - Name: SM_RECOVERY
        MaxLevel: 5
      - Name: SM_ENDURE
        MaxLevel: 5
      - Name: AC_CONCENTRATION
        MaxLevel: 10
        Requires:
          - Name: AC_VULTURE
            Level: 0
  # Hunter rebalance: Detecting is repurposed into an offensive falcon strike and
  # relocated under Steel Crow in the tree. It now requires Steel Crow 10 (which
  # transitively pulls Blitz Beat 5 and Falconry Mastery), so its old Improve
  # Concentration 1 and Falconry Mastery 1 prerequisites are erased (Level 0).
  # MaxLevel 4 -> 5. Propagates to Sniper and the baby/high Hunter trees through
  # inheritance.
  # Hunter rebalance: Serrated Shot (HT_PHANTASMIC) is no longer a quest skill (the
  # IsQuest flag is cleared in db/import/skill_db.yml). It becomes a 10-level skill-point
  # attack with no prerequisites of its own.
  # Hunter rebalance: HT_LANDMINE (Land Mine) is now a passive skill (see db/import/skill_db.yml)
  # and is gated behind Serrated Shot (HT_PHANTASMIC) level 5. MaxLevel stays 5. HT_BLASTMINE
  # and HT_REMOVETRAP still require HT_LANDMINE level 1, so they inherit the new gating transitively.
  - Job: Hunter
    Tree:
      - Name: HT_PHANTASMIC
        MaxLevel: 10
      - Name: HT_LANDMINE
        MaxLevel: 5
        Requires:
          - Name: HT_PHANTASMIC
            Level: 5
      - Name: HT_DETECTING
        MaxLevel: 5
        Requires:
          - Name: AC_CONCENTRATION
            Level: 0
          - Name: HT_FALCON
            Level: 0
          - Name: HT_STEELCROW
            Level: 10
  # Hunter rebalance: HT_POWER (Wyvern Bolt) is no longer a Double Attack combo
  # skill; it is now a normal 5-level skill-point bow attack gated behind Master
  # Fletching (AC_MAKINGARROW) level 10. Propagates to Sniper and the baby/high
  # Hunter trees through inheritance. AC_DOUBLE Level 0 erases the inherited
  # Double Strafe prerequisite from the base re tree (import merges Requires, it
  # does not replace them, so the old gate must be explicitly removed).
      - Name: HT_POWER
        MaxLevel: 5
        Requires:
          - Name: AC_MAKINGARROW
            Level: 10
          - Name: AC_DOUBLE
            Level: 0
  # Tranquillizing Dart rebalance: HT_SANDMAN is now a single-rank targeted dart
  # (see db/pre-re/skill_db.yml) gated behind Ankle Snare level 1 instead of Flasher.
      - Name: HT_SANDMAN
        MaxLevel: 1
        Requires:
          - Name: HT_ANKLESNARE
            Level: 1
  # Master Fletching rebalance: AC_MAKINGARROW (formerly the Arrow Crafting quest
  # skill) is now a 10-level skill-point passive (see db/import/skill_db.yml). It is
  # gated behind Jagged Fletching (HT_LANDMINE) level 5 and Tranquillizing Dart
  # (HT_SANDMAN) level 1. MaxLevel 1 -> 10. AC_MAKINGARROW is defined natively only in
  # the Hunter tree, so this propagates to Sniper and the baby/high Hunter trees
  # through inheritance and Archers do not gain it.
      - Name: AC_MAKINGARROW
        MaxLevel: 10
        Requires:
          - Name: HT_LANDMINE
            Level: 5
          - Name: HT_SANDMAN
            Level: 1
  # Hunter rebalance: HT_SPRINGTRAP (Crippling Talons) is now a passive Blitz Beat
  # rider (see db/import/skill_db.yml). Its prerequisites are Tranquillizing Dart
  # (HT_SANDMAN) level 1 and Blitz Beat (HT_BLITZBEAT) level 1. MaxLevel stays 5.
  # HT_FALCON Level 0 erases the inherited Falcon Mastery prerequisite from the
  # base re tree (import merges Requires, it does not replace them).
      - Name: HT_SPRINGTRAP
        MaxLevel: 5
        Requires:
          - Name: HT_SANDMAN
            Level: 1
          - Name: HT_BLITZBEAT
            Level: 1
          - Name: HT_FALCON
            Level: 0
  # Two-Handed Sword Mastery rebalance: Parrying's SM_TWOHAND prerequisite is
  # lowered from level 10 to level 5 to match the trimmed SM_TWOHAND MaxLevel
  # (see the Swordman Tree override above and db/import/skill_db.yml).
  # Requires entries for the same prerequisite skill overwrite in place
  # (keyed map), so this simply replaces the inherited Level: 10 gate.
  # Increase HP Recovery rebalance: Tension Relax's SM_RECOVERY prerequisite is
  # lowered from level 10 to level 5 to match the trimmed SM_RECOVERY MaxLevel
  # (see the Swordman Tree override above and db/import/skill_db.yml) — level 10
  # is no longer reachable, so the skill would be unlearnable otherwise.
  - Job: Lord_Knight
    Tree:
      - Name: LK_PARRYING
        MaxLevel: 10
        Requires:
          - Name: SM_TWOHAND
            Level: 5
      - Name: LK_TENSIONRELAX
        MaxLevel: 1
        Requires:
          - Name: SM_RECOVERY
            Level: 5
