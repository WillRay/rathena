###########################################################################
# Skill Tree Database
###########################################################################
#
# Skill Tree Settings
#
###########################################################################
# - Job                   Job name.
#   Inherit               Map of job name from which Job will inherit the skill tree. (Default: null)
#                         Note that Job doesn't inherit the child skills, it only inherits the skills defined in Tree of the given job name.
#   Tree:                 List of skills available for the job. (Default: null)
#     - Name              Skill name.
#       MaxLevel          Max level of the skill. Set to 0 to remove the skill.
#       Exclude           Whether the skill is excluded from being inherited. (Default: false)
#       BaseLevel         Minimum base level required to unlock the skill. (Default: 0)
#       JobLevel          Minimum job level required to unlock the skill. (Default: 0)
#       Requires:         List of skills required to unlock the skill. (Default: null)
#         - Name          Skill name.
#           Level         Skill level required. Set to 0 to remove the skill.
###########################################################################

Header:
  Type: SKILL_TREE_DB
  Version: 1

Body:
  # Payon Stories rebalance: Preserve is available early to non-transcendent Rogues
  # so Plagiarism builds don't depend on a constant supply from other players.
  - Job: Rogue
    Tree:
      - Name: ST_PRESERVE
        MaxLevel: 1
        Requires:
          - Name: RG_PLAGIARISM
            Level: 10
  - Job: Baby_Rogue
    Tree:
      - Name: ST_PRESERVE
        MaxLevel: 1
        Requires:
          - Name: RG_PLAGIARISM
            Level: 10
  # Payon Stories rebalance: Sonic Blow no longer requires Katar Mastery 4.
  # Dagger stealth Assassins skip Katar Mastery entirely, so gating their new
  # dagger-capable Sonic Blow behind it locked them out of the skill (and of the
  # Sonic Blow -> Opportunist feed). Level 0 erases the AS_KATAR prerequisite;
  # MaxLevel 10 is restated because the parser requires it, and the removal
  # propagates to the Assassin Cross and baby trees through inheritance.
  - Job: Assassin
    Tree:
      - Name: AS_SONICBLOW
        MaxLevel: 10
        Requires:
          - Name: AS_KATAR
            Level: 0
  # Payon Stories rebalance: Charge Arrow is no longer a quest skill (the IsQuest
  # flag is cleared in db/import/skill_db.yml). It is now a 5-level skill-point
  # skill gated behind Arrow Shower 5, sitting directly under Arrow Shower in the
  # tree. The change propagates to Hunter/Sniper and the baby trees through
  # Archer inheritance.
  - Job: Archer
    Tree:
      - Name: AC_CHARGEARROW
        MaxLevel: 5
        Requires:
          - Name: AC_SHOWER
            Level: 5
  # Payon Stories rebalance: Improve Concentration no longer requires Vulture's
  # Eye 1. Level 0 erases the AC_VULTURE prerequisite; MaxLevel 10 is restated
  # because the parser requires it. The removal propagates to Hunter/Sniper,
  # Bard/Dancer and the baby/high trees through Archer inheritance. Super Novice
  # and Super Baby define the skill natively, so they are erased separately.
      - Name: AC_CONCENTRATION
        MaxLevel: 10
        Requires:
          - Name: AC_VULTURE
            Level: 0
  - Job: Supernovice
    Tree:
      - Name: AC_CONCENTRATION
        MaxLevel: 10
        Requires:
          - Name: AC_VULTURE
            Level: 0
  - Job: Super_Baby
    Tree:
      - Name: AC_CONCENTRATION
        MaxLevel: 10
        Requires:
          - Name: AC_VULTURE
            Level: 0
  # Hunter rebalance: Detecting is repurposed into an offensive falcon strike and
  # relocated under Steel Crow in the tree. It now requires Steel Crow 10 (which
  # transitively pulls Blitz Beat 5 and Falconry Mastery), so its old Improve
  # Concentration 1 and Falconry Mastery 1 prerequisites are erased (Level 0).
  # MaxLevel 4 -> 5. Propagates to Sniper and the baby/high Hunter trees through
  # inheritance.
  - Job: Hunter
    Tree:
      - Name: HT_DETECTING
        MaxLevel: 5
        Requires:
          - Name: AC_CONCENTRATION
            Level: 0
          - Name: HT_FALCON
            Level: 0
          - Name: HT_STEELCROW
            Level: 10
