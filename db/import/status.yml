###########################################################################
# Status Change Database
###########################################################################
#
# Status Change Settings
#
###########################################################################
# - Status                    Status change name.
#   Icon                      Status change icon. (Default: EFST_BLANK)
#   DurationLookup            Default status change duration. (Default: 0)
#   States:                   Status change state to determine player states. (Default: None)
#   CalcFlags:                Status change calculation to indicate which stat is adjusted. (Default: None)
#   Opt1                      Special effect when a status change is active. Non-stackable. (Default: None)
#   Opt2:                     Special options/client effects when a status change is active. (Default: None)
#   Opt3:                     Special options/client effects when a status change is active. (Default: Normal)
#   Options:                  Special options/client effects when a status change is active. (Default: Nothing)
#   Flags:                    Special flags which trigger during certain events.  (Default: None)
#   MinRate                   Minimum rate after status change reduction (10000 = 100%). (Default: 0)
#   MinDuration               Minimum duration in milliseconds after status change reduction. (Default: 1)
#   Fail:                     List of Status Changes that causes the status to fail to activate. (Optional)
#   EndOnStart:               List of Status Changes that will end when the status activates. (Optional)
#   EndReturn:                List of Status Changes that will end when the status activates and won't give its effect. (Optional)
#   EndOnEnd:                 List of Status Changes that will end when the status becomes inactive. (Optional)
#   Script:                   Script to execute, when starting the status change. (Optional)
###########################################################################

Header:
  Type: STATUS_DB
  Version: 4
Body:
  # Payon Stories rebalance: Enchant Poison now also grants a flat ATK bonus
  # (val3, +5 per skill level) that applies even against poison-immune targets,
  # so the status must recalc Batk when it starts/ends. Atk_Ele is preserved
  # (the weapon still becomes Poison element). See status.cpp SC_ENCPOISON.
  - Status: Encpoison
    CalcFlags:
      Atk_Ele: true
      Batk: true
  # Payon Stories rebalance: Two-Hand Quicken now grants FLEE + CRIT
  - Status: Twohandquicken
    CalcFlags:
      Aspd: true
      Cri: true
      Flee: true
  # Payon Stories rebalance: Strip Helm now also reduces MDEF on monsters,
  # so the status needs to recalc Mdef when it starts/ends.
  - Status: Striphelm
    CalcFlags:
      Int: true
      Mdef: true
  # Thief passive rebalance: Opportunist (Improve Dodge buff).
  # Granted on a successful flee-dodge in PvE; halves the SP cost of the
  # next damaging skill cast, then ends. Disabled in PvP/WoE at the
  # proc site in battle.cpp. Repurposes EFST_FIGHTINGSPIRIT — the
  # original SC_FIGHTINGSPIRIT (RK skill) is unreachable on this pre-re
  # server, so the icon collision is theoretical.
  - Status: Opportunist
    Icon: EFST_FIGHTINGSPIRIT
    Flags:
      NoWarning: true
  # Thief quest skill stone economy: "Holding Stone" flag granted by Find
  # Stone and consumed by Stone Fling / Sand Attack. Pure flag — no stat
  # bonus, no CalcFlags. Indefinite duration (started with INFINITE_TICK).
  # No NoRemoveOnDead flag, so it clears on death by default; map changes
  # and relog leave it intact. Reuses the Lux Anima icon (EFST_LUXANIMA);
  # no new sprite asset is required.
  - Status: Pick_Stone
    Icon: EFST_LUXANIMA
    Flags:
      NoWarning: true
  # Hunter rebalance: "Hunted" mark applied to targets hit by Blitz Beat for
  # 7 seconds. Pure flag status — no stat bonus, no CalcFlags. The client-side
  # visual is a one-shot EF_MARKING_USE_CHANGEMONSTER effect fired on apply
  # from blitzbeat.cpp, so no persistent status icon is needed here.
  - Status: Hunted
    Flags:
      NoWarning: true
  # Hunter rebalance: Land Mine passive. A lodged "arrow" applied by Double Strafe / Arrow
  # Shower when the caster has learned the Land Mine passive; 1.5s later it tears open for a
  # single burst of damage ("it hurts when the arrow is removed"). All damage behaviour lives
  # in status.cpp (SC_LANDMINE_BLEED): val1 holds the burst damage, val2 the caster GID, and
  # it fires exactly once because its 1500ms duration equals its 1500ms interval. It borrows
  # vanilla Bleeding's look — the EFST_BLOODING icon and the Opt2 blood-drip effect during the
  # 1.5s wait (SendOption transmits it) — but none of Bleeding's mechanics: no VIT/LUK resist,
  # no boss immunity, no regen block (no CalcFlags: Regen), and it can't collide with a real
  # Bleeding. Opt2 Bleeding is purely cosmetic (no gameplay logic keys off OPT2_BLEEDING).
  # NoSave so a pending burst does not persist across relog.
  - Status: Landmine_Bleed
    Icon: EFST_BLOODING
    Opt2:
      Bleeding: true
    Flags:
      SendOption: true
      NoSave: true
  # Hunter rebalance: Razorwing slow. Applied to targets hit by Blitz Beat when
  # the caster has learned the Razorwing passive (HT_SPRINGTRAP). val1 carries the
  # speed penalty %, read in status.cpp status_calc_speed, so CalcFlags Speed must
  # recalc movement speed on start/end. Borrows the Decrease Agility icon
  # (EFST_DEC_AGI) for a familiar "slowed" visual. Debuff so status resistance
  # applies. See src/map/skills/archer/blitzbeat.cpp for the 10%/5% per-level split.
  - Status: Razorwing_Slow
    Icon: EFST_DEC_AGI
    CalcFlags:
      Speed: true
    Flags:
      Debuff: true
      NoWarning: true
  # Swordsman rebalance: Two-Handed Sword Mastery ("Relentless Assault"). SM_TWOHAND
  # no longer grants a flat 2H-sword ATK bonus; instead landing any offensive skill
  # grants this buff to self (val1 = SM_TWOHAND level), which empowers the caster's
  # next auto attack with bonus damage in battle.cpp battle_calc_attack_skill_ratio,
  # then consumes itself. Not gated on BF_MAGIC - the Swordsman/Knight/Crusader tree
  # has no offensive magic skills, so a magic-only gate would make the buff
  # unreachable for its own class. Reuses the Rune Knight Enchant Blade icon
  # (EFST_ENCHANTBLADE); RK_ENCHANTBLADE is unreachable on this pre-re server, so no
  # icon collision in practice. The icon's hover tooltip (client
  # lua files/stateicon/stateiconinfo.lub) is repurposed to say "Relentless Assault"
  # / "Your next melee physical attack will deal increased damage" instead of the
  # original Enchant Blade text. 5s window to land the empowered auto attack, or it
  # expires unused.
  - Status: Twohandboost
    Icon: EFST_ENCHANTBLADE
    Flags:
      NoWarning: true
